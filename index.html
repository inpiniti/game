<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RilyBox Game</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;        /* 스크롤바 제거 → 꽉 찬 화면 */
            background: #1d1d24;
        }
        /* Phaser 캔버스가 브라우저 창을 꽉 채움 (FIT 모드가 비율 유지하며 확대) */
        #game {
            width: 100vw;
            height: 100vh;
        }
        #game canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="game"></div>

    <!-- 1) Phaser 엔진 (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>

    <!-- 2) 타일셋 목록(자동 생성) + 씬 정의 — main.js 보다 먼저 로드 -->
    <script src="js/tileset-manifest.js"></script>
    <script src="js/scenes/MainScene.js"></script>

    <!-- 2-1) 서바이벌(뱀서라이크) 모드 — 데이터 파일 먼저, 씬은 그 다음 -->
    <script src="js/quiz-data.js"></script>
    <script src="js/upgrades.js"></script>
    <script src="js/scenes/SurvivalScene.js"></script>

    <!-- 3) 게임 부팅 -->
    <script src="js/main.js"></script>
</body>
</html>
